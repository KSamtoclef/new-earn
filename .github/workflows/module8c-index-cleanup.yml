name: Module 8C Index Cleanup

on:
  push:
    branches:
      - module-4-reward-engine
    paths:
      - .github/workflows/module8c-index-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: module-4-reward-engine
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force latest auth controller cache key
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');
          html = html.replace(/chatearn-auth-session-fix\.js\?v=[^"']+/g, 'chatearn-auth-session-fix.js?v=8.0.4');
          fs.writeFileSync(path, html);
          NODE

      - name: Verify final routes
        run: |
          ! grep -q 'chatearn-v6-2-rewards.css' index.html
          ! grep -q 'chatearn-v6-2-3-final.js' index.html
          grep -q 'chatearn-module7-admin.js' index.html
          grep -q 'chatearn-auth-session-fix.js?v=8.0.4' index.html
          grep -q "const VERSION = '8.0.4'" assets/js/chatearn-auth-session-fix.js

      - name: Commit index cache update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'Load auth session controller 8.0.4'
          git push origin HEAD:module-4-reward-engine

# Updated intentionally to trigger the auth controller deployment.
