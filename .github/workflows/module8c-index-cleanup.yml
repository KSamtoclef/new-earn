name: ChatEarn Production Runtime Cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/module8c-index-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out production branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove duplicate chat controllers
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const indexPath = 'index.html';
          let html = fs.readFileSync(indexPath, 'utf8');

          const duplicatePatterns = [
            /\s*<script src="\.\/assets\/js\/chatearn-chat-withdraw-cta\.js\?v=[^"]+" defer><\/script>/g,
            /\s*<script src="\.\/assets\/js\/chatearn-chat-ads\.js\?v=[^"]+" defer><\/script>/g,
            /\s*<script src="\.\/assets\/js\/chatearn-first-session-limit\.js\?v=[^"]+" defer><\/script>/g
          ];
          duplicatePatterns.forEach(pattern => { html = html.replace(pattern, ''); });

          html = html.replace(
            /chatearn-chat-runtime-integrity\.js\?v=[^"']+/g,
            'chatearn-chat-runtime-integrity.js?v=8.6.0'
          );

          const runtimeTag = '<script src="./assets/js/chatearn-chat-runtime-integrity.js?v=8.6.0" defer></script>';
          const marker = '<script src="./assets/js/chatearn-module7-admin.js?v=8.1.0" defer></script>';
          if (!html.includes(marker)) throw new Error('Module 7 marker missing');
          if (!html.includes(runtimeTag)) html = html.replace(marker, `${runtimeTag}\n${marker}`);

          const appPath = 'assets/js/chatearn-app.js';
          let app = fs.readFileSync(appPath, 'utf8');
          app = app.replace(/MAX_EARN=\d+/, 'MAX_EARN=80000');
          if (!app.includes('MAX_EARN=80000')) throw new Error('80k session limit missing');

          fs.writeFileSync(indexPath, html);
          fs.writeFileSync(appPath, app);
          NODE

      - name: Verify clean production runtime
        run: |
          ! grep -q 'chatearn-chat-withdraw-cta.js' index.html
          ! grep -q 'chatearn-chat-ads.js' index.html
          ! grep -q 'chatearn-first-session-limit.js' index.html
          grep -q 'chatearn-chat-runtime-integrity.js?v=8.6.0' index.html
          grep -q "const VERSION = '8.6.0'" assets/js/chatearn-chat-runtime-integrity.js
          grep -q 'MAX_EARN=80000' assets/js/chatearn-app.js

      - name: Commit production cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/js/chatearn-app.js
          git diff --cached --quiet || git commit -m 'Clean duplicate chat runtime controllers'
          git push origin HEAD:main
