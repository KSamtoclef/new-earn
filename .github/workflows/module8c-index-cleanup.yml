name: ChatEarn Canonical Runtime Release Audit

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/module8c-index-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-and-cache-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out production branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply canonical cache keys and remove retired references
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');

          const retired = [
            'chatearn-v6-2-3-final.js',
            'chatearn-v6-2-rewards.css',
            'chatearn-v8f-final-stabilizer.js',
            'chatearn-chat-withdraw-cta.js',
            'chatearn-chat-ads.js',
            'chatearn-first-session-limit.js'
          ];

          for (const asset of retired) {
            const escaped = asset.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            html = html.replace(new RegExp('\\s*<(?:script|link)[^>]+(?:src|href)="[^"]*' + escaped + '[^"]*"[^>]*(?:><\\/script>)?', 'g'), '');
          }

          const replacements = [
            [/chatearn-v4-returning\.js\?v=[^"']+/g, 'chatearn-v4-returning.js?v=5.0.0'],
            [/chatearn-v4-2\.js\?v=[^"']+/g, 'chatearn-v4-2.js?v=4.2.1'],
            [/chatearn-auth-session-fix\.js\?v=[^"']+/g, 'chatearn-auth-session-fix.js?v=8.0.5'],
            [/chatearn-chat-runtime-integrity\.js\?v=[^"']+/g, 'chatearn-chat-runtime-integrity.js?v=8.6.1'],
            [/chatearn-module7-admin\.js\?v=[^"']+/g, 'chatearn-module7-admin.js?v=9.0.0'],
            [/chatearn-v6-admin\.js\?v=[^"']+/g, 'chatearn-v6-admin.js?v=6.1.6']
          ];
          replacements.forEach(([pattern, value]) => { html = html.replace(pattern, value); });

          const required = [
            'chatearn-v3.js?v=4.2.0',
            'chatearn-v4-returning.js?v=5.0.0',
            'chatearn-v4-2.js?v=4.2.1',
            'chatearn-auth-session-fix.js?v=8.0.5',
            'chatearn-chat-runtime-integrity.js?v=8.6.1',
            'chatearn-module7-admin.js?v=9.0.0',
            'chatearn-v6-admin.js?v=6.1.6'
          ];

          required.forEach(asset => {
            const count = html.split(asset).length - 1;
            if (count !== 1) throw new Error(asset + ' reference count is ' + count);
          });
          retired.forEach(asset => {
            if (html.includes(asset)) throw new Error('Retired asset still referenced: ' + asset);
          });

          fs.writeFileSync(path, html);
          NODE

      - name: Verify controller ownership and syntax
        run: |
          node --check assets/js/chatearn-v4-returning.js
          node --check assets/js/chatearn-v4-2.js
          node --check assets/js/chatearn-v8e-direct-withdrawal-flow.js
          node --check assets/js/chatearn-module7-admin.js
          node --check assets/js/chatearn-v7-admin-withdrawals.js
          node --check assets/js/chatearn-v7-admin-kyc.js
          node --check assets/js/chatearn-v8d-offer-withdrawal-flow.js
          grep -q "const VERSION = 'canonical-portal-5.0.0'" assets/js/chatearn-v4-returning.js
          grep -q "const VERSION = 'canonical-1.1.0'" assets/js/chatearn-module7-admin.js
          grep -q "__CHAT_EARN_V8E8_DIRECT_WITHDRAWAL__" assets/js/chatearn-v8e-direct-withdrawal-flow.js
          ! test -f assets/js/chatearn-v8f-final-stabilizer.js

      - name: Verify static runtime references exist
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const refs = [...html.matchAll(/(?:src|href)="\.\/(assets\/[^"?]+)(?:\?[^" ]*)?"/g)].map(m => m[1]);
          const missing = [...new Set(refs)].filter(file => !fs.existsSync(file));
          if (missing.length) throw new Error('Missing referenced assets: ' + missing.join(', '));
          console.log('Verified local assets:', new Set(refs).size);
          NODE

      - name: Commit audited cache keys
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'Finalize canonical runtime cache keys and static audit'
          git push origin HEAD:main
