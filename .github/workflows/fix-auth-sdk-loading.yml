name: Fix auth SDK loading
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-auth-sdk-loading.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make Supabase SDK non-blocking
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text()
          old = '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>'
          new = '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>'
          if old in text:
              text = text.replace(old, new, 1)
          text = text.replace('chatearn-auth-watchdog.js?v=10.0.0','chatearn-auth-watchdog.js?v=11.0.0')
          p.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'Unblock auth SDK startup'
          git push