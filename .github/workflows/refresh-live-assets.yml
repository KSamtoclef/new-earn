name: Refresh live assets
on:
  push:
    paths:
      - '.github/workflows/refresh-live-assets.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh asset versions
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          s = s.replace('chatearn.css?v=7.0.0', 'chatearn.css?v=10.0.0')
          s = s.replace('chatearn-app.js?v=7.0.0', 'chatearn-app.js?v=10.0.0')
          s = s.replace('chatearn-v4-2.js?v=7.0.0', 'chatearn-v4-2.js?v=10.0.0')
          s = s.replace('chatearn-auth-session-fix.js?v=9.0.0', 'chatearn-auth-session-fix.js?v=10.0.0')
          marker = '<script src="./assets/js/chatearn-auth-session-fix.js?v=10.0.0" defer></script>'
          watchdog = marker + '\n<script src="./assets/js/chatearn-auth-watchdog.js?v=10.0.0" defer></script>'
          if 'chatearn-auth-watchdog.js' not in s:
              s = s.replace(marker, watchdog)
          p.write_text(s)
          PY
      - name: Commit refreshed assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'Load latest chat and auth assets'
          git push
