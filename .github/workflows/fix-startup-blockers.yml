name: Fix startup blockers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-startup-blockers.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Make external startup resources non-blocking
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>',
              '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>'
          )

          text = text.replace(
              '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">',
              '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media=\'all\'"><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>'
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit startup fix
        run: |
          if git diff --quiet -- index.html; then
            echo "No patch required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Prevent external scripts from blocking first paint"
          git push origin main
