name: Bump bootstrap cache version
on:
  push:
    paths:
      - '.github/workflows/bump-bootstrap-v13.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text()
          old='./assets/js/bootstrap.js?v=12'
          new='./assets/js/bootstrap.js?v=13'
          if old not in s:
              raise SystemExit('bootstrap v12 reference not found')
          p.write_text(s.replace(old,new))
          PY
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Load bootstrap version 13"
          git push
