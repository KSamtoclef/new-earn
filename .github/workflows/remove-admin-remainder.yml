name: Remove admin markup remainder

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-admin-remainder.yml'

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove leftover inactive markup
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          app = '<script src="./assets/js/chatearn-app.js?v=7.0.0" defer></script>'
          ads = '<script src="./assets/js/chatearn-v4-2.js?v=7.0.0" defer></script>'
          auth = '<script src="./assets/js/chatearn-auth-session-fix.js?v=9.0.0" defer></script>'

          # Everything between the active app script and active ads script is stale admin markup.
          s = re.sub(
              re.escape(app) + r'.*?' + re.escape(ads),
              app + '\n' + ads,
              s,
              count=1,
              flags=re.S,
          )

          # Remove any remaining admin element fragments defensively.
          s = re.sub(r'\s*<div class="admin-panel".*?(?=' + re.escape(ads) + r')', '\n', s, flags=re.S)

          # Guarantee one copy of each active runtime and correct order.
          for tag in (app, ads, auth):
              s = s.replace(tag, '')
          s = s.replace('</body>', f'{app}\n{ads}\n{auth}\n</body>')

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Remove remaining inactive admin markup"
          git push
