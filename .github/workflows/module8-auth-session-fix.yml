name: Module 8 Auth Session Fix

on:
  push:
    branches:
      - module-4-reward-engine
    paths:
      - .github/workflows/module8-auth-session-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: module-4-reward-engine
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install auth/session bridge
        run: node scripts/module8-install-auth-session-fix.mjs

      - name: Verify script order
        run: |
          grep -q 'chatearn-v4-2.js' index.html
          grep -q 'chatearn-auth-session-fix.js?v=8.0.1' index.html

      - name: Commit updated index
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index change required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Load Module 8 auth session fix'
          git push origin HEAD:module-4-reward-engine
