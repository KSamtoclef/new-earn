name: Original Flow Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [restore/original-design-flow, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tests/original-flow-check.mjs
