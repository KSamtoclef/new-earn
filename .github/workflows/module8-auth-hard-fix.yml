name: Module 8 Auth Hard Fix

on:
  push:
    branches:
      - module-4-reward-engine
    paths:
      - .github/workflows/module8-auth-hard-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: module-4-reward-engine
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply deterministic auth fix
        run: node scripts/module8-auth-hard-fix.mjs

      - name: Verify hard fix
        run: |
          grep -q "no active login session was established" assets/js/chatearn-app.js
          grep -q "Login succeeded, but no active session was established" assets/js/chatearn-app.js
          grep -q "chatearn-auth-session-fix.js?v=8.0.3" index.html

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/chatearn-app.js index.html
          git diff --cached --quiet || git commit -m 'Fix registration and login session establishment'
          git push origin HEAD:module-4-reward-engine
