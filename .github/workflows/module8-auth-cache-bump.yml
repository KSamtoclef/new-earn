name: Module 8 Auth Cache Bump

on:
  push:
    branches:
      - module-4-reward-engine
    paths:
      - .github/workflows/module8-auth-cache-bump.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: module-4-reward-engine
          fetch-depth: 0
      - name: Bump auth bridge version in index
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          old = 'chatearn-auth-session-fix.js?v=8.0.1'
          new = 'chatearn-auth-session-fix.js?v=8.0.2'
          if old not in s:
              raise SystemExit('Expected auth asset reference not found')
          p.write_text(s.replace(old, new, 1))
          PY
      - name: Commit index update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Bump auth session bridge cache version'
          git push origin HEAD:module-4-reward-engine
